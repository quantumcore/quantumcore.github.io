# The Site Configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Riyadh

title: QuantumCore
tagline: Cybersecurity | Red Teaming | Code & Intel
description: >-
  A curated technical blog covering red teaming, malware dev, threat hunting, and deep-dive security research.

url: "https://quantumcore.github.io"

github:
  username: quantumcore

twitter:
  username: your_twitter_handle  # Optional

social:
  name: Fahad
  email: contact@yourdomain.com
  links:
    - https://twitter.com/your_twitter_handle
    - https://github.com/quantumcore

webmaster_verifications:
  google: your-google-site-verification
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id: G-XXXXXXXXXX
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode: dark

cdn:

avatar: /assets/img/avatar.png

social_preview_image: /assets/img/social-preview.png

toc: true

comments:
  provider: giscus
  giscus:
    repo: quantumcore/quantumcore.github.io
    repo_id: YOUR_REPO_ID
    category: General
    category_id: YOUR_CATEGORY_ID
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en
    reactions_enabled: 1

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - rollup.config.js
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
